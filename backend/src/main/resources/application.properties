spring.datasource.url=jdbc:sqlserver://localhost:1434;databaseName=microfina;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=Password123!

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.drop-first=false
# ── Photos membres ────────────────────────────────────────────────────────────
app.photos.dir=./photos
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# ── Sauvegarde base de données ────────────────────────────────────────────────
app.backup.dir=./backups

# ── Jobs planifiés (cron — surcharger en prod si nécessaire) ──────────────────
app.jobs.calcul-interets.cron=0 0 1 * * ?
app.jobs.recalcul-par.cron=0 30 1 * * ?
app.jobs.cloture-journaliere.cron=0 50 23 * * ?
