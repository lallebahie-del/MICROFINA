<div class="page-container">

  <div class="page-header">
    <h2 class="page-title">{{ isNew ? 'Nouveau membre' : 'Modifier le membre ' + numMembre }}</h2>
    <button class="btn btn-outline" (click)="annuler()">← Retour</button>
  </div>

  <div class="alert alert-error"   *ngIf="error()">{{ error() }}</div>
  <div class="alert alert-success" *ngIf="success()">{{ success() }}</div>
  <div class="loading-indicator"   *ngIf="loading()">Chargement…</div>

  <form class="form-card" (ngSubmit)="submit()" *ngIf="!loading()">

    <!-- ── Identification ── -->
    <fieldset class="form-section">
      <legend>Identification</legend>

      <div class="form-row">
        <div class="form-group">
          <label>N° Membre *</label>
          <input type="text" [(ngModel)]="form.numMembre" name="numMembre"
                 [disabled]="!isNew" required placeholder="ex: M-2024-00001"/>
        </div>
        <div class="form-group">
          <label>Type</label>
          <select [(ngModel)]="form.dtype" name="dtype">
            <option value="PP">Personne physique</option>
            <option value="PM">Personne morale</option>
            <option value="GRP">Groupement</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Nom</label>
          <input type="text" [(ngModel)]="form.nom" name="nom"/>
        </div>
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" [(ngModel)]="form.prenom" name="prenom"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Raison sociale <small>(personne morale)</small></label>
          <input type="text" [(ngModel)]="form.raisonSociale" name="raisonSociale"/>
        </div>
        <div class="form-group">
          <label>Numéro national (NNI)</label>
          <input type="text" [(ngModel)]="form.numeroNationalId" name="numeroNationalId"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Sexe</label>
          <select [(ngModel)]="form.sexe" name="sexe">
            <option value="M">Masculin</option>
            <option value="F">Féminin</option>
          </select>
        </div>
        <div class="form-group">
          <label>Date de naissance</label>
          <input type="date" [(ngModel)]="form.dateNaissance" name="dateNaissance"/>
        </div>
        <div class="form-group">
          <label>Lieu de naissance</label>
          <input type="text" [(ngModel)]="form.lieuNaissance" name="lieuNaissance"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Situation matrimoniale</label>
          <select [(ngModel)]="form.situationMatrimoniale" name="situationMatrimoniale">
            <option value="">–</option>
            <option value="CELIBATAIRE">Célibataire</option>
            <option value="MARIE">Marié(e)</option>
            <option value="DIVORCE">Divorcé(e)</option>
            <option value="VEUF">Veuf/Veuve</option>
          </select>
        </div>
        <div class="form-group">
          <label>Matricule</label>
          <input type="text" [(ngModel)]="form.matriculeMembre" name="matriculeMembre"/>
        </div>
      </div>
    </fieldset>

    <!-- ── Statut / État ── -->
    <fieldset class="form-section">
      <legend>Statut &amp; État</legend>

      <div class="form-row">
        <div class="form-group">
          <label>Statut</label>
          <select [(ngModel)]="form.statut" name="statut">
            <option value="DEMANDE">DEMANDE</option>
            <option value="ACTIF">ACTIF</option>
            <option value="INACTIF">INACTIF</option>
            <option value="REJETE">REJETE</option>
          </select>
        </div>
        <div class="form-group">
          <label>État</label>
          <select [(ngModel)]="form.etat" name="etat">
            <option value="ACTIF">ACTIF</option>
            <option value="INACTIF">INACTIF</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Date demande</label>
          <input type="date" [(ngModel)]="form.dateDemande" name="dateDemande"/>
        </div>
        <div class="form-group">
          <label>Date validation</label>
          <input type="date" [(ngModel)]="form.dateValidation" name="dateValidation"/>
        </div>
      </div>

      <div class="form-group" *ngIf="form.statut === 'REJETE'">
        <label>Motif de rejet</label>
        <textarea [(ngModel)]="form.motifRejet" name="motifRejet" rows="2"></textarea>
      </div>
    </fieldset>

    <!-- ── Contact ── -->
    <fieldset class="form-section">
      <legend>Contact</legend>

      <div class="form-row">
        <div class="form-group">
          <label>Personne à contacter</label>
          <input type="text" [(ngModel)]="form.personneAcontacter" name="personneAcontacter"/>
        </div>
        <div class="form-group">
          <label>Contact de la personne</label>
          <input type="text" [(ngModel)]="form.contactPersonneContact" name="contactPersonneContact"/>
        </div>
      </div>

      <div class="form-group">
        <label>Observation</label>
        <textarea [(ngModel)]="form.observation" name="observation" rows="3"></textarea>
      </div>
    </fieldset>

    <!-- ── Actions ── -->
    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="saving()">
        {{ saving() ? 'Enregistrement…' : (isNew ? 'Créer le membre' : 'Enregistrer') }}
      </button>
      <button type="button" class="btn btn-outline" (click)="annuler()">Annuler</button>
    </div>

  </form>
</div>
