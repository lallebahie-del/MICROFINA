<div class="login-page">
  <div class="login-header">
    <div class="login-logo">M</div>
    <div>
      <span class="login-brand">Microfinance ERP</span>
      <span class="login-subtitle-header">Console d'administration sécurisée</span>
    </div>
  </div>

  <div class="login-card">
    <h2 class="login-title">Connexion</h2>
    <p class="login-subtitle">Saisissez vos identifiants pour accéder à votre espace.</p>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>

      <div class="form-group">
        <label for="username" class="form-label">Identifiant</label>
        <input
          id="username"
          type="text"
          name="username"
          class="form-input"
          placeholder="admin"
          [(ngModel)]="username"
          required
          autocomplete="username"
          [disabled]="loading"
        />
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Mot de passe</label>
        <div class="input-wrapper">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            name="password"
            class="form-input"
            placeholder="••••••••"
            [(ngModel)]="password"
            required
            autocomplete="current-password"
            [disabled]="loading"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="togglePassword()"
            [attr.aria-label]="showPassword ? 'Masquer le mot de passe' : 'Afficher le mot de passe'"
          >
            <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
              viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
              viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="remember-row">
        <label class="remember-label">
          <input
            type="checkbox"
            class="remember-checkbox"
            [(ngModel)]="rememberMe"
            name="rememberMe"
            [disabled]="loading"
          />
          <span>Se souvenir de moi</span>
        </label>
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        class="btn-login"
        [disabled]="loading || !loginForm.form.valid"
      >
        {{ loading ? 'Connexion en cours...' : 'Se connecter' }}
      </button>

    </form>
  </div>
</div>
