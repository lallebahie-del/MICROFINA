<div class="login-wrapper">

  <!-- Floating background shapes (mirrors the home page aesthetic) -->
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <div class="login-card">

    <!-- Logo / Brand -->
    <div class="brand">
      <div class="brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <h1 class="brand-name">Micro <strong>Crédit</strong> ++</h1>
      <p class="brand-sub">Système de Gestion de Microfinance</p>
    </div>

    <h2 class="form-title">Connexion</h2>

    <!-- Error banner -->
    @if (errorMsg()) {
      <div class="error-banner" role="alert">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        {{ errorMsg() }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>

      <!-- Username -->
      <div class="field-group">
        <label for="username">Login</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input
            id="username"
            type="text"
            name="username"
            [(ngModel)]="username"
            placeholder="ex : admin"
            autocomplete="username"
            required
            [disabled]="loading()"
          />
        </div>
      </div>

      <!-- Password -->
      <div class="field-group">
        <label for="password">Mot de passe</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input
            id="password"
            [type]="showPass() ? 'text' : 'password'"
            name="password"
            [(ngModel)]="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
            [disabled]="loading()"
          />
          <button type="button" class="toggle-pass" (click)="toggleShowPass()"
                  [attr.aria-label]="showPass() ? 'Masquer' : 'Afficher'">
            @if (showPass()) {
              <!-- Eye-off -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            } @else {
              <!-- Eye -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            }
          </button>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-login" [disabled]="loading()">
        @if (loading()) {
          <span class="spinner"></span>
          Connexion en cours…
        } @else {
          Se connecter
        }
      </button>

    </form>

    <!-- Hint for dev -->
    <p class="hint">
      <strong>admin</strong> / Admin@1234 &nbsp;·&nbsp;
      <strong>aminata.sow</strong> / Agent@1234 &nbsp;·&nbsp;
      <strong>oumar.ba</strong> / Comite@1234
    </p>

  </div>
</div>
