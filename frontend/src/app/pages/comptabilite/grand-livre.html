<div class="page-container">
  <h2 class="page-title">Grand Livre</h2>

  <div class="filters">
    <input type="text" [(ngModel)]="agence" placeholder="Agence" class="form-control" />
    <input type="text" [(ngModel)]="compte" placeholder="N° compte" class="form-control" />
    <button (click)="load()" class="btn btn-primary">Afficher</button>
  </div>

  <div *ngIf="loading" class="loading">Chargement…</div>

  <table *ngIf="!loading && lignes.length > 0" class="table">
    <thead>
      <tr>
        <th>Date</th><th>Pièce</th><th>Compte</th><th>Libellé</th>
        <th>Débit</th><th>Crédit</th><th>Solde cumulé</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let l of lignes">
        <td>{{ l.dateEcriture }}</td>
        <td>{{ l.numPiece }}</td>
        <td>{{ l.numCompte }}</td>
        <td>{{ l.libelle }}</td>
        <td class="montant">{{ l.debit | number:'1.2-2' }}</td>
        <td class="montant">{{ l.credit | number:'1.2-2' }}</td>
        <td class="montant">{{ l.soldeCumule | number:'1.2-2' }}</td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="!loading && lignes.length === 0" class="empty-state">Aucune ligne trouvée.</p>
</div>
