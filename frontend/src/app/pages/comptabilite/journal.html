<div class="page-container">
  <h2 class="page-title">Journal comptable</h2>

  <div class="filters">
    <input type="text"  [(ngModel)]="agence" placeholder="Agence" class="form-control" />
    <input type="date"  [(ngModel)]="date"   class="form-control" />
    <button (click)="load()" class="btn btn-primary">Filtrer</button>
  </div>

  <div *ngIf="loading" class="loading">Chargement…</div>

  <table *ngIf="!loading && lignes.length > 0" class="table">
    <thead>
      <tr>
        <th>Date</th><th>Code journal</th><th>N° pièce</th><th>Compte</th>
        <th>Libellé</th><th>Débit</th><th>Crédit</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let l of lignes">
        <td>{{ l.dateEcriture }}</td>
        <td>{{ l.codeJournal }}</td>
        <td>{{ l.numPiece }}</td>
        <td>{{ l.numCompte }}</td>
        <td>{{ l.libelle }}</td>
        <td class="montant">{{ l.debit | number:'1.2-2' }}</td>
        <td class="montant">{{ l.credit | number:'1.2-2' }}</td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="!loading && lignes.length === 0" class="empty-state">Aucune écriture pour ce filtre.</p>
</div>
