<div class="page-container">
  <h2 class="page-title">Privilèges (PRIV_*)</h2>

  <div *ngIf="loading" class="loading">Chargement…</div>

  <table *ngIf="!loading && privileges.length > 0" class="table">
    <thead>
      <tr>
        <th>Code privilège</th><th>Libellé</th><th>Module</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of privileges">
        <td><code>{{ p.codePrivilege }}</code></td>
        <td>{{ p.libelle }}</td>
        <td>{{ p.module ?? '—' }}</td>
      </tr>
    </tbody>
  </table>

  <p *ngIf="!loading && privileges.length === 0" class="empty-state">Aucun privilège configuré.</p>
</div>
