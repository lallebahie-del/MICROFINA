<div class="page-container">
  <h2 class="page-title">Épargne — Dépôts &amp; Retraits</h2>

  <div class="filters">
    <input type="text" [(ngModel)]="agenceFilter" placeholder="Agence" class="form-control" />
    <button (click)="load()" class="btn btn-primary">Filtrer</button>
  </div>

  <div *ngIf="loading" class="loading">Chargement…</div>

  <div *ngFor="let c of comptes" class="card mb-3">
    <div class="card-header">
      <strong>{{ c.numCompte }}</strong> — {{ c.nomMembre ?? c.numMembre }}
      <span class="float-right montant">{{ c.solde | number:'1.2-2' }} MRU</span>
    </div>
    <div class="card-body" *ngIf="selectedId === c.id">
      <input type="number" [(ngModel)]="montant" placeholder="Montant" class="form-control mb-2" />
      <input type="text"   [(ngModel)]="libelle"  placeholder="Libellé" class="form-control mb-2" />
      <button (click)="depot(c.id)"   class="btn btn-success me-2">Dépôt</button>
      <button (click)="retrait(c.id)" class="btn btn-danger">Retrait</button>
    </div>
    <div class="card-footer">
      <button (click)="selectedId = selectedId === c.id ? null : c.id" class="btn btn-sm btn-secondary">
        {{ selectedId === c.id ? 'Annuler' : 'Opération' }}
      </button>
    </div>
  </div>

  <p *ngIf="!loading && comptes.length === 0" class="empty-state">Aucun compte épargne.</p>
</div>
