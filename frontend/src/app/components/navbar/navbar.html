<nav class="navbar">

  <!-- ── Brand ─────────────────────────────────────────────────────── -->
  <div class="navbar-brand">
    <span class="brand-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </span>
    <span class="brand-text">Micro <strong>Crédit</strong> ++</span>
  </div>

  <!-- ── Spacer ────────────────────────────────────────────────────── -->
  <div class="navbar-menu"></div>

  <!-- ── Right side : bell + avatar ───────────────────────────────── -->
  <div class="navbar-end">

    <!-- Notifications -->
    <button class="nav-tool-btn" type="button" title="Notifications">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>
        <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>
      </svg>
    </button>

    <!-- Avatar + user menu -->
    <div class="user-wrapper" [class.open]="showMenu()">
      <button class="user-avatar" type="button" title="Mon compte"
              (click)="toggleMenu($event)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </button>

      @if (showMenu()) {
        <div class="user-menu" (click)="$event.stopPropagation()">
          <div class="user-menu-head">
            <div class="user-menu-name">{{ displayName() }}</div>
            <div class="user-menu-role">{{ authService.currentUser()?.username }}</div>
          </div>

          <a routerLink="/profile" class="user-menu-item" (click)="closeMenu()">
            <svg class="user-menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            Profil
          </a>

          <button class="user-menu-item user-menu-item-logout" type="button" (click)="logout()">
            <svg class="user-menu-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Déconnexion
          </button>
        </div>
      }
    </div>

  </div>
</nav>
