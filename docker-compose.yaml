# Dev local (Spring sur 8080, Angular sur 4200) : lancer sans le profil docker-backend
#   docker compose up -d
# Stack complète avec API dans Docker (publie aussi le port 8080) :
#   docker compose --profile docker-backend up -d

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: microfina-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      # Complex password (SQL Server policy). Override via .env if needed.
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Password123!}"
      MSSQL_PID: "Developer"
    volumes:
      - sqlserver_data:/var/opt/mssql
    ports:
      - "1434:1433"
    healthcheck:
      # Use container env var MSSQL_SA_PASSWORD (do NOT single-quote it, or it won't expand)
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  # Creates the 'microfina' database once SQL Server is ready
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: microfina-sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Password123!}"
    command: >
      /opt/mssql-tools18/bin/sqlcmd
      -S sqlserver -U sa -P "${MSSQL_SA_PASSWORD:-Password123!}"
      -C -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = N'microfina') CREATE DATABASE microfina"
    restart: "no"

  backend:
    profiles: ["docker-backend"]
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: microfina-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlserver://sqlserver:1433;databaseName=microfina;encrypt=true;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: "${MSSQL_SA_PASSWORD:-Password123!}"
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: microfina-adminer
    ports:
      - "8888:8080"
    depends_on:
      - sqlserver
    restart: unless-stopped

volumes:
  sqlserver_data:
