version: "3.9"

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: microfina-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Password123!"
      MSSQL_PID: "Developer"
    ports:
      - "1434:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Password123!' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  # Creates the 'microfina' database once SQL Server is ready
  sqlserver-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: microfina-sqlserver-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ACCEPT_EULA: "Y"
    command: >
      /opt/mssql-tools18/bin/sqlcmd
      -S sqlserver -U sa -P "Password123!"
      -C -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = N'microfina') CREATE DATABASE microfina"
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: microfina-backend
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:sqlserver://sqlserver:1433;databaseName=microfina;encrypt=true;trustServerCertificate=true
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD: Password123!
    depends_on:
      sqlserver-init:
        condition: service_completed_successfully
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: microfina-adminer
    ports:
      - "8888:8080"
    depends_on:
      - sqlserver
    restart: unless-stopped

volumes:
  sqlserver_data:
